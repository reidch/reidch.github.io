<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Reid Chen — Computer Graphics, Games, Artificial Intelligence, Digital Arts and Blog.">
  <meta name="theme-color" content="#050308">
  <title>Reid Chen | Graphics, Games & AI</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="ambient ambient-a" aria-hidden="true"></div>
  <div class="ambient ambient-b" aria-hidden="true"></div>
  <div class="grid-overlay" aria-hidden="true"></div>

  <header class="site-header">
    <nav class="nav-shell" aria-label="Primary navigation">
      <a class="brand" href="#/" aria-label="Home">
        <span class="devil-mark" aria-hidden="true">😈</span>
        <span class="brand-copy">
          <strong id="brandName">REID CHEN</strong>
          <small id="brandRole">Graphics · Games · AI · Art</small>
        </span>
      </a>

      <button class="menu-button" id="menuButton" type="button" aria-label="Open menu" aria-expanded="false">☰</button>

      <div class="nav-panel" id="navPanel">
        <div class="nav-links" id="navLinks"></div>
        <label class="language-control" aria-label="Language">
          <span>文/A</span>
          <select id="languageSelect">
            <option value="en">EN</option>
            <option value="ja">日本語</option>
            <option value="zh">中文</option>
          </select>
        </label>
      </div>
    </nav>
  </header>

  <main id="app">
    <section class="loading-state">
      <span class="loading-devil">😈</span>
      <p>Loading portfolio…</p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span id="copyright">© 2026 Reid Chen</span>
      <span id="footerLine">Designed with code and a little devilish energy 😈</span>
    </div>
  </footer>

  <dialog class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightboxClose" type="button" aria-label="Close">×</button>
    <img id="lightboxImage" alt="">
    <p id="lightboxCaption"></p>
  </dialog>

  <noscript>This site requires JavaScript to load its data-driven content.</noscript>
  <script type="module" src="app.js"></script>
</body>
</html>
